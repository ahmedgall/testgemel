<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | إدارة الخدمات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #ffffff; min-height: 100vh; }
        .category-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; cursor: pointer; }
        .category-card:hover { border-color: #e11d48; transform: translateY(-10px); background: rgba(225, 29, 72, 0.1); }
        .input-dark { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; padding: 1rem; width: 100%; color: white; }
        #loader-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loader-overlay">
        <div class="w-16 h-16 border-4 border-t-rose-600 border-white/10 rounded-full spin mb-4"></div>
        <p id="loader-text" class="text-rose-600 font-bold text-center"></p>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-white mb-2">THE BRIDE</h1>
            <p class="text-gray-500 uppercase tracking-widest text-xs">Partner Data Center</p>
        </header>

        <div id="step-categories" class="hidden">
            <h2 class="text-2xl font-bold mb-10 text-center text-rose-500">اختر نشاطك</h2>
            <div id="categories-grid" class="grid grid-cols-2 lg:grid-cols-5 gap-6"></div>
        </div>

        <div id="step-form" class="hidden max-w-2xl mx-auto">
            <div class="bg-zinc-900/40 p-8 rounded-[2.5rem] border border-white/5">
                <h3 id="form-title" class="text-2xl font-bold mb-6 text-center text-rose-600"></h3>
                <form id="uploadDataForm" class="space-y-4">
                    <input type="text" id="pName" placeholder="اسم النشاط" class="input-dark text-center" required>
                    <input type="text" id="pAddress" placeholder="العنوان" class="input-dark text-center" required>
                    <textarea id="pDesc" placeholder="وصف الخدمة" class="input-dark h-24 text-center"></textarea>
                    
                    <div class="border-2 border-dashed border-white/10 p-6 rounded-2xl text-center">
                        <input type="file" id="pImages" multiple accept="image/*" class="hidden" onchange="document.getElementById('imgCount').innerText = 'تم اختيار ' + this.files.length + ' صور'">
                        <div onclick="document.getElementById('pImages').click()" class="cursor-pointer">
                            <p class="text-gray-500">اضغط لرفع الصور</p>
                            <p id="imgCount" class="text-rose-600 font-bold mt-2"></p>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-rose-600 text-white py-4 rounded-xl font-bold">حفظ وإرسال</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_API_KEY = '59e66336e76f59c8697669678e078972';

        let selectedId = '';
        const userPhone = sessionStorage.getItem('userPhone');

        // Check user
        (async () => {
            if (!userPhone) { window.location.href="index.html"; return; }
            document.getElementById('loader-overlay').style.display = 'flex';
            const q = query(collection(db, "bride_services"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if (!snap.empty) { window.location.href = "adm.html"; }
            else { 
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('step-categories').classList.remove('hidden');
            }
        })();

        // Categories Grid
        const cats = ['halls', 'makeup', 'hair', 'dresses', 'photo'];
        const grid = document.getElementById('categories-grid');
        cats.forEach(c => {
            const div = document.createElement('div');
            div.className = "category-card p-6 rounded-2xl text-center";
            div.innerHTML = `<p class="font-bold text-white uppercase">${c}</p>`;
            div.onclick = () => {
                selectedId = c;
                document.getElementById('form-title').innerText = c;
                document.getElementById('step-categories').classList.add('hidden');
                document.getElementById('step-form').classList.remove('hidden');
            };
            grid.appendChild(div);
        });

        document.getElementById('uploadDataForm').onsubmit = async (e) => {
            e.preventDefault();
            const files = document.getElementById('pImages').files;
            if(files.length === 0) return alert("ارفع صور");

            document.getElementById('loader-overlay').style.display = 'flex';
            
            try {
                const urls = [];
                const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1280, useWebWorker: true };

                for (let file of files) {
                    document.getElementById('loader-text').innerText = `جاري ضغط ورفع صورة...`;
                    
                    // 1. ضغط الصورة قبل الرفع
                    const compressedFile = await imageCompression(file, options);
                    
                    // 2. رفع الصورة المضغوطة
                    const formData = new FormData();
                    formData.append('image', compressedFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.success) urls.push(data.data.url);
                }

                await addDoc(collection(db, "bride_services"), {
                    phone: userPhone,
                    category: selectedId,
                    name: document.getElementById('pName').value,
                    address: document.getElementById('pAddress').value,
                    images: urls,
                    time: serverTimestamp()
                });

                window.location.href = "adm.html";
            } catch (err) {
                alert("فشل الرفع، حاول مرة أخرى");
                document.getElementById('loader-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
