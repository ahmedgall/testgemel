<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | إدارة الخدمات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #ffffff; min-height: 100vh; overflow-x: hidden; }
        .category-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .category-card:hover { 
            border-color: #e11d48; transform: translateY(-10px); 
            background: linear-gradient(145deg, rgba(225, 29, 72, 0.1), transparent);
            box-shadow: 0 20px 40px rgba(225, 29, 72, 0.1);
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem; padding: 1rem; width: 100%; color: white; transition: 0.3s;
        }
        .input-dark:focus { border-color: #e11d48; background: rgba(255, 255, 255, 0.05); outline: none; }
        #loader-overlay { 
            display: flex; position: fixed; inset: 0; background: rgba(0,0,0,1); 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loader-overlay">
        <div class="w-16 h-16 border-4 border-t-rose-600 border-white/10 rounded-full spin mb-4"></div>
        <p id="loader-text" class="text-rose-600 font-bold text-xl animate-pulse">جاري التحقق من الحساب...</p>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-white mb-4 tracking-tighter">THE BRIDE</h1>
            <p class="text-gray-500 uppercase tracking-[5px] text-xs">Partner Data Center</p>
        </header>

        <div id="step-categories" class="hidden">
            <h2 class="text-2xl font-bold mb-10 text-center text-rose-500">أهلاً بك.. أكمل بيانات نشاطك للبدء</h2>
            <div id="categories-grid" class="grid grid-cols-2 lg:grid-cols-5 gap-6"></div>
        </div>

        <div id="step-form" class="hidden max-w-2xl mx-auto animate-fadeIn">
            <button onclick="goBack()" class="flex items-center text-gray-500 hover:text-white mb-8 transition">
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 12H5m7 7l-7-7 7-7"/></svg>
                رجوع للأقسام
            </button>
            
            <div class="bg-zinc-900/40 p-8 rounded-[3rem] border border-white/5 shadow-2xl">
                <h3 id="form-title" class="text-3xl font-bold mb-8 text-center"></h3>
                <form id="uploadDataForm" class="space-y-5">
                    <input type="text" id="pName" placeholder="اسم القاعة / المحل / النشاط" class="input-dark text-center text-lg" required>
                    <input type="text" id="pAddress" placeholder="العنوان بالتفصيل (محافظة - منطقة)" class="input-dark text-center" required>
                    <textarea id="pDesc" placeholder="وصف للخدمات المميزة" class="input-dark h-32 text-center"></textarea>
                    
                    <div class="group relative border-2 border-dashed border-white/10 p-10 rounded-[2rem] text-center hover:border-rose-600 transition-all">
                        <input type="file" id="pImages" multiple accept="image/*" class="hidden" onchange="showPreview(this)">
                        <div onclick="document.getElementById('pImages').click()" class="cursor-pointer">
                            <svg class="w-12 h-12 text-gray-600 mx-auto mb-4 group-hover:text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <p class="text-gray-500 group-hover:text-white">ارفع صور المكان</p>
                            <p id="imgCount" class="text-rose-600 font-bold mt-2"></p>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-5 rounded-2xl font-bold text-xl transition-all">حفظ البيانات</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function checkUserStatus() {
            const userAuth = sessionStorage.getItem('isAuth');
            const userPhone = sessionStorage.getItem('userPhone');

            if (!userAuth || !userPhone) {
                window.location.href = "index.html";
                return;
            }

            const q = query(collection(db, "bride_services"), where("phone", "==", userPhone));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                window.location.href = "adm.html";
            } else {
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('step-categories').classList.remove('hidden');
            }
        }

        checkUserStatus();

        const sections = [
            { id: 'halls', name: 'قاعات أفراح', svg: '<path d="M3 21h18M3 10l9-7 9 7v11H3V10z M9 21v-4a3 3 0 016 0v4"/>' },
            { id: 'makeup', name: 'ميك أب ارتست', svg: '<path d="M12 22a9 9 0 100-18 9 9 0 000 18z M8 11h.01M16 11h.01M12 16c1.5 0 3-1 3-1s-1.5-1-3-1-3 1-3 1 1.5 1 3 1z"/>' },
            { id: 'hair', name: 'كوافير', svg: '<path d="M12 14c2.8 0 5-2.2 5-5s-2.2-5-5-5-5 2.2-5 5 2.2 5 5 5z M5 21v-2a7 7 0 0114 0v2"/>' },
            { id: 'dresses', name: 'فساتين زفاف', svg: '<path d="M12 3L4 9v12h16V9l-8-6z M12 3v18M4 9h16"/>' },
            { id: 'limo', name: 'ليموزين', svg: '<path d="M7 17a2 2 0 100-4 2 2 0 000 4z M17 17a2 2 0 100-4 2 2 0 000 4z M5 15h14l-1-6H6l-1 6z"/>' },
            { id: 'suits', name: 'بدل رجالي', svg: '<path d="M12 2L4 7v15h16V7l-8-5z M12 2v20"/>' },
            { id: 'honeymoon', name: 'هاني مون', svg: '<path d="M5 12h14M12 5l7 7-7 7"/>' },
            { id: 'photo', name: 'فوتوغرافير', svg: '<path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>' },
            { id: 'dj', name: 'دي جي', svg: '<path d="M9 18V5l12-2v13M9 18a3 3 0 11-6 0 3 3 0 016 0zm12-2a3 3 0 11-6 0 3 3 0 016 0z"/>' },
            { id: 'catering', name: 'بوفيه', svg: '<path d="M3 11l18-5v12L3 18v-7z M3 11l18-5M12 11v7"/>' }
        ];

        let selectedId = '';
        const grid = document.getElementById('categories-grid');
        sections.forEach(s => {
            const card = document.createElement('div');
            card.className = "category-card p-8 rounded-[2.5rem] text-center";
            card.innerHTML = `<svg class="w-10 h-10 text-rose-600 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">${s.svg}</svg><p class="font-bold text-sm">${s.name}</p>`;
            card.onclick = () => {
                selectedId = s.id;
                document.getElementById('form-title').innerText = s.name;
                document.getElementById('step-categories').classList.add('hidden');
                document.getElementById('step-form').classList.remove('hidden');
            };
            grid.appendChild(card);
        });

        window.goBack = () => {
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-categories').classList.remove('hidden');
        };

        window.showPreview = (input) => {
            document.getElementById('imgCount').innerText = `تم اختيار ${input.files.length} صور`;
        };

        document.getElementById('uploadDataForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loader-overlay').style.display = 'flex';
            document.getElementById('loader-text').innerText = "جاري حفظ البيانات والدخول للوحة التحكم...";

            try {
                // تخطي الـ Storage مؤقتاً لتجنب الـ Blaze Plan
                // هنخزن مصفوفة فاضية أو صور تجريبية
                const dummyUrls = ["https://via.placeholder.com/400"];

                await addDoc(collection(db, "bride_services"), {
                    phone: sessionStorage.getItem('userPhone'),
                    category: selectedId,
                    name: document.getElementById('pName').value,
                    address: document.getElementById('pAddress').value,
                    desc: document.getElementById('pDesc').value,
                    images: dummyUrls, 
                    time: serverTimestamp()
                });

                // التحويل لـ adm.html هيحصل فوراً لأن Firestore مجاني
                window.location.href = "adm.html";
            } catch (err) {
                console.error("Error:", err);
                alert("مشكلة في الحفظ: " + err.message);
                document.getElementById('loader-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
