<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | لوحة تحكم الشريك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #ffffff; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; transition: 0.3s; }
        .glass-card:hover { border-color: #e11d48; }
        .tab-btn.active { border-bottom: 3px solid #e11d48; color: #e11d48; }
        .time-slot { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .time-slot.closed { background: #450a0a; border-color: #e11d48; color: #ffffff; opacity: 0.5; }
        .time-slot.open { background: #064e3b; border-color: #10b981; color: #ffffff; }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; color: white; width: 100%; }
        #loader { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .img-container:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-t-rose-600 border-white/10 rounded-full animate-spin mb-4"></div>
        <p id="loader-text" class="text-rose-600 text-sm font-bold">جاري تحميل البيانات...</p>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-right">
                <h1 class="text-3xl font-bold">لوحة تحكم <span class="text-rose-600" id="businessName">...</span></h1>
                <p class="text-gray-400 text-sm">إدارة نشاطك وحجوزاتك من مكان واحد</p>
            </div>
            <div class="flex gap-3">
                <button onclick="switchTab('settings')" class="bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition font-bold">تعديل النشاط</button>
                <button onclick="logout()" class="bg-rose-900/30 text-rose-500 px-6 py-3 rounded-xl hover:bg-rose-900 transition font-bold">خروج</button>
            </div>
        </div>

        <div class="flex gap-8 mb-8 border-b border-white/10 pb-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('bookings')" id="tab-bookings" class="tab-btn active pb-2 font-bold whitespace-nowrap">الحجوزات</button>
            <button onclick="switchTab('schedule')" id="tab-schedule" class="tab-btn pb-2 font-bold whitespace-nowrap">المواعيد</button>
            <button onclick="switchTab('reviews')" id="tab-reviews" class="tab-btn pb-2 font-bold whitespace-nowrap">التقييمات</button>
        </div>

        <div id="section-bookings" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>

        <div id="section-schedule" class="hidden">
            <div class="glass-card p-6 md:p-10 text-center">
                <h2 class="text-xl font-bold mb-4">جدول المواعيد اليومي</h2>
                <div class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-3" id="hoursGrid"></div>
            </div>
        </div>

        <div id="section-reviews" class="hidden space-y-4">
            <div class="glass-card p-8 flex items-center justify-around text-center">
                <div><p class="text-gray-400 text-sm mb-1">التقييم العام</p><h2 class="text-5xl font-black text-rose-600" id="totalRate">0.0</h2></div>
            </div>
            <div id="reviewsList" class="space-y-4"></div>
        </div>

        <div id="section-settings" class="hidden max-w-3xl mx-auto">
            <div class="glass-card p-8 space-y-6">
                <h2 class="text-2xl font-bold text-rose-500">تعديل بيانات النشاط</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-xs text-gray-500 mb-2">اسم النشاط</label><input type="text" id="editName" class="input-dark"></div>
                    <div><label class="block text-xs text-gray-500 mb-2">العنوان</label><input type="text" id="editAddress" class="input-dark"></div>
                </div>

                <div><label class="block text-xs text-gray-500 mb-2">الوصف</label><textarea id="editDesc" class="input-dark h-24"></textarea></div>

                <div>
                    <label class="block text-sm font-bold text-white mb-4">معرض الصور الخاص بك</label>
                    <div id="editImages" class="grid grid-cols-3 md:grid-cols-5 gap-4 mb-6">
                        </div>
                    
                    <div class="border-2 border-dashed border-white/10 p-6 rounded-2xl text-center hover:border-rose-600 transition">
                        <input type="file" id="addNewImgs" multiple accept="image/*" class="hidden" onchange="uploadMoreImages(this)">
                        <div onclick="document.getElementById('addNewImgs').click()" class="cursor-pointer">
                            <p class="text-rose-500 font-bold">+ إضافة صور جديدة للنشاط</p>
                            <p class="text-[10px] text-gray-500 mt-1">سيتم ضغط الصور ورفعها تلقائياً</p>
                        </div>
                    </div>
                </div>

                <button onclick="saveChanges()" class="w-full bg-green-600 p-4 rounded-xl font-bold hover:bg-green-700 transition">حفظ التعديلات النهائية</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPhone = sessionStorage.getItem('userPhone');
        const IMGBB_API_KEY = '59e66336e76f59c8697669678e078972';

        if(!userPhone) window.location.href = "index.html";

        let myBusinessId = "";
        let currentImages = [];

        // 1. التبديل بين الأقسام
        window.switchTab = (tab) => {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
        };

        // 2. التحميل الأولي للبيانات
        async function init() {
            const q = query(collection(db, "bride_services"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                myBusinessId = snap.docs[0].id;
                const data = snap.docs[0].data();
                currentImages = data.images || [];

                document.getElementById('businessName').innerText = data.name;
                document.getElementById('editName').value = data.name;
                document.getElementById('editAddress').value = data.address;
                document.getElementById('editDesc').value = data.desc || "";
                
                renderImages();
                loadHours(data.closedHours || []);
                loadBookings();
                loadReviews();
            }
            document.getElementById('loader').style.display = 'none';
        }

        // 3. عرض الصور مع زر الحذف
        function renderImages() {
            const container = document.getElementById('editImages');
            container.innerHTML = "";
            currentImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = "img-container relative aspect-square rounded-xl overflow-hidden border border-white/10";
                div.innerHTML = `
                    <img src="${img}" class="w-full h-full object-cover">
                    <button onclick="removeImg(${index})" class="delete-btn absolute inset-0 bg-black/60 opacity-0 flex items-center justify-center transition text-rose-500 font-bold">حذف</button>
                `;
                container.appendChild(div);
            });
        }

        // 4. حذف صورة
        window.removeImg = async (index) => {
            if(!confirm("هل أنت متأكد من حذف هذه الصورة؟")) return;
            currentImages.splice(index, 1);
            renderImages();
        };

        // 5. رفع صور إضافية (مع الضغط)
        window.uploadMoreImages = async (input) => {
            const files = input.files;
            if (files.length === 0) return;

            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "جاري تحضير ورفع الصور الجديدة...";

            try {
                const options = { maxSizeMB: 0.4, maxWidthOrHeight: 1200, useWebWorker: true };
                
                for (let file of files) {
                    const compressed = await imageCompression(file, options);
                    const formData = new FormData();
                    formData.append('image', compressed);

                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const result = await res.json();
                    if(result.success) {
                        currentImages.push(result.data.url);
                    }
                }
                renderImages();
                alert("تم إضافة الصور للمعرض بنجاح (لا تنسَ حفظ التعديلات)");
            } catch (err) {
                alert("خطأ أثناء الرفع");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        };

        // 6. حفظ كل التغييرات
        window.saveChanges = async () => {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "جاري الحفظ...";
            
            try {
                await updateDoc(doc(db, "bride_services", myBusinessId), {
                    name: document.getElementById('editName').value,
                    address: document.getElementById('editAddress').value,
                    desc: document.getElementById('editDesc').value,
                    images: currentImages
                });
                alert("تم تحديث البيانات بنجاح!");
                location.reload();
            } catch (err) {
                alert("فشل الحفظ");
                document.getElementById('loader').style.display = 'none';
            }
        };

        // باقي الوظائف (الحجوزات، المواعيد، التقييمات)
        function loadBookings() {
            const q = query(collection(db, "bookings"), where("servicePhone", "==", userPhone));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('section-bookings');
                list.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    list.innerHTML += `
                        <div class="glass-card p-6 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold">${b.clientName}</h3>
                                <p class="text-xs text-rose-500">${b.date} | ${b.time}</p>
                            </div>
                            <span class="text-[10px] bg-white/5 px-3 py-1 rounded-full">${b.status || 'معلق'}</span>
                        </div>`;
                });
            });
        }

        function loadHours(closed) {
            const grid = document.getElementById('hoursGrid');
            grid.innerHTML = "";
            for(let i=0; i<24; i++) {
                const h = i < 10 ? `0${i}:00` : `${i}:00`;
                const isClosed = closed.includes(h);
                const div = document.createElement('div');
                div.className = `time-slot p-2 rounded-lg text-[10px] font-bold ${isClosed ? 'closed' : 'open'}`;
                div.innerText = h;
                div.onclick = async () => {
                    let newC = isClosed ? closed.filter(x => x !== h) : [...closed, h];
                    await updateDoc(doc(db, "bride_services", myBusinessId), { closedHours: newC });
                    loadHours(newC);
                };
                grid.appendChild(div);
            }
        }

        async function loadReviews() {
            const q = query(collection(db, "reviews"), where("serviceId", "==", myBusinessId));
            const snap = await getDocs(q);
            let total = 0;
            snap.forEach(d => {
                const r = d.data();
                total += parseFloat(r.rate);
                document.getElementById('reviewsList').innerHTML += `<div class="glass-card p-4 text-sm">${r.comment}</div>`;
            });
            document.getElementById('totalRate').innerText = snap.size > 0 ? (total/snap.size).toFixed(1) : "0.0";
        }

        window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };

        init();
    </script>
</body>
</html>
