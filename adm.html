<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | لوحة تحكم الشريك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #ffffff; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; transition: 0.3s; }
        .glass-card:hover { border-color: #e11d48; }
        .tab-btn.active { border-bottom: 3px solid #e11d48; color: #e11d48; }
        .time-slot { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .time-slot.closed { background: #450a0a; border-color: #e11d48; color: #ffffff; opacity: 0.5; }
        .time-slot.open { background: #064e3b; border-color: #10b981; color: #ffffff; }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; color: white; width: 100%; }
        #loader { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; display: none; }
        .img-container { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: #e11d48; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-t-rose-600 border-white/10 rounded-full animate-spin mb-4"></div>
        <p id="loader-text" class="text-rose-600 text-sm font-bold text-center">جاري معالجة الصور...</p>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-right">
                <h1 class="text-3xl font-bold">لوحة تحكم <span class="text-rose-600" id="businessName">...</span></h1>
                <p class="text-gray-400 text-sm">إدارة نشاطك وحجوزاتك وصورك</p>
            </div>
            <div class="flex gap-3">
                <button onclick="switchTab('settings')" class="bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition font-bold">تعديل النشاط</button>
                <button onclick="logout()" class="bg-rose-900/30 text-rose-500 px-6 py-3 rounded-xl hover:bg-rose-900 transition font-bold">خروج</button>
            </div>
        </div>

        <div class="flex gap-8 mb-8 border-b border-white/10 pb-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('bookings')" id="tab-bookings" class="tab-btn active pb-2 font-bold whitespace-nowrap">الحجوزات</button>
            <button onclick="switchTab('schedule')" id="tab-schedule" class="tab-btn pb-2 font-bold whitespace-nowrap">المواعيد</button>
            <button onclick="switchTab('reviews')" id="tab-reviews" class="tab-btn pb-2 font-bold whitespace-nowrap">التقييمات</button>
        </div>

        <div id="section-bookings" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        <div id="section-schedule" class="hidden">...</div>
        <div id="section-reviews" class="hidden">...</div>

        <div id="section-settings" class="hidden max-w-3xl mx-auto">
            <div class="glass-card p-8 space-y-6">
                <h2 class="text-2xl font-bold text-rose-500">إدارة بيانات ومعرض الصور</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="editName" class="input-dark" placeholder="اسم النشاط">
                    <input type="text" id="editAddress" class="input-dark" placeholder="العنوان">
                </div>
                <textarea id="editDesc" class="input-dark h-24" placeholder="وصف النشاط"></textarea>

                <div class="space-y-4">
                    <label class="block text-sm font-bold text-white">الصور الحالية (اضغط على X للحذف):</label>
                    <div id="editImages" class="grid grid-cols-3 md:grid-cols-5 gap-4"></div>
                    
                    <div class="border-2 border-dashed border-white/10 p-8 rounded-2xl text-center hover:border-rose-600 transition cursor-pointer" onclick="document.getElementById('addNewImgs').click()">
                        <input type="file" id="addNewImgs" multiple accept="image/*" class="hidden" onchange="uploadMoreImages(this)">
                        <p class="text-rose-500 font-bold text-lg">+ إضافة صور جديدة</p>
                        <p class="text-xs text-gray-500 mt-2">سيتم سحب الصور وعرضها فوراً للتأكد</p>
                    </div>
                </div>

                <button onclick="saveChanges()" class="w-full bg-green-600 p-4 rounded-xl font-bold hover:bg-green-700 transition">حفظ التعديلات في قاعدة البيانات</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, collection, query, where, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPhone = sessionStorage.getItem('userPhone');
        const IMGBB_API_KEY = '59e66336e76f59c8697669678e078972';

        let myBusinessId = "";
        let currentImages = []; // المصفوفة اللي شايلة الروابط

        // 1. التبديل
        window.switchTab = (tab) => {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
        };

        // 2. تحميل البيانات
        async function init() {
            const q = query(collection(db, "bride_services"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                myBusinessId = snap.docs[0].id;
                const data = snap.docs[0].data();
                currentImages = data.images || [];
                
                document.getElementById('businessName').innerText = data.name;
                document.getElementById('editName').value = data.name;
                document.getElementById('editAddress').value = data.address;
                document.getElementById('editDesc').value = data.desc || "";
                
                renderImages(); // اسحب واعرض الصور
            }
        }

        // 3. وظيفة عرض الصور (الـ Rendering)
        function renderImages() {
            const container = document.getElementById('editImages');
            container.innerHTML = "";
            currentImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = "img-container";
                div.innerHTML = `
                    <img src="${img}" class="w-full h-full object-cover">
                    <div class="delete-btn" onclick="removeImg(${index})">✕</div>
                `;
                container.appendChild(div);
            });
        }

        // 4. حذف صورة من المصفوفة (قبل الحفظ)
        window.removeImg = (index) => {
            currentImages.splice(index, 1);
            renderImages(); // حدث العرض فوراً
        };

        // 5. السحر هنا: رفع الصور وسحب روابطها فوراً
        window.uploadMoreImages = async (input) => {
            const files = input.files;
            if (files.length === 0) return;

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                // خيارات الضغط لضمان سرعة الرفع
                const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1280, useWebWorker: true };

                for (let file of files) {
                    document.getElementById('loader-text').innerText = `جاري معالجة: ${file.name}`;
                    
                    // ضغط
                    const compressed = await imageCompression(file, options);
                    
                    // رفع لـ ImgBB
                    const formData = new FormData();
                    formData.append('image', compressed);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const result = await res.json();

                    if(result.success) {
                        // "سحب" الرابط الجديد وإضافته للمصفوفة
                        currentImages.push(result.data.url);
                        console.log("تم سحب الرابط:", result.data.url);
                    }
                }
                
                // تحديث العرض فوراً عشان تتأكد إنهم اتسحبوا
                renderImages();
                alert("تم سحب الصور بنجاح! راجع الصور ثم اضغط حفظ التعديلات.");
                
            } catch (err) {
                alert("حدث خطأ أثناء الرفع");
                console.error(err);
            } finally {
                loader.style.display = 'none';
                input.value = ""; // تفريغ الـ input
            }
        };

        // 6. الحفظ النهائي في Firebase
        window.saveChanges = async () => {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            document.getElementById('loader-text').innerText = "جاري حفظ البيانات في السيرفر...";

            try {
                await updateDoc(doc(db, "bride_services", myBusinessId), {
                    name: document.getElementById('editName').value,
                    address: document.getElementById('editAddress').value,
                    desc: document.getElementById('editDesc').value,
                    images: currentImages // دي المصفوفة اللي فيها الروابط الجديدة والقديمة
                });
                alert("تم الحفظ بنجاح!");
            } catch (err) {
                alert("فشل الحفظ");
            } finally {
                loader.style.display = 'none';
            }
        };

        window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };
        init();
    </script>
</body>
</html>
