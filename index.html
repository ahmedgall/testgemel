<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | Partners Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e11d48;
            --bg-dark: #050505;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(225, 29, 72, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(225, 29, 72, 0.05), transparent);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .auth-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-dark:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.15);
            outline: none;
        }
        .btn-premium {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3);
            filter: brightness(1.1);
        }
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div class="auth-card w-full max-w-md p-12 relative">
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-full bg-rose-600/10 mb-4">
                <svg class="w-12 h-12 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">The Bride</h1>
            <p class="text-gray-400 text-sm font-light uppercase tracking-widest italic">Partners Exclusive</p>
        </div>

        <form id="partnerAuthForm" class="space-y-6">
            <div class="relative">
                <input type="email" id="userEmail" required 
                    class="w-full input-dark p-4 rounded-2xl text-white placeholder-gray-600 text-center text-lg" 
                    placeholder="name@gmail.com">
            </div>

            <button type="submit" id="submitBtn" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg shadow-xl">
                <span>إرسال رابط الدخول</span>
            </button>
        </form>

        <div id="msgContainer" class="hidden mt-6 p-4 rounded-xl bg-green-500/10 border border-green-500/20 text-center">
            <p id="msg" class="text-green-400 text-sm font-medium"></p>
        </div>

        <div class="mt-12 text-center border-t border-white/5 pt-6">
            <p class="text-gray-600 text-[10px] tracking-[3px]">POWERED BY FIXAA ARAB</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557",
            measurementId: "G-VKVNTDXW0P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('partnerAuthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const btn = document.getElementById('submitBtn');
            const msgContainer = document.getElementById('msgContainer');
            const msg = document.getElementById('msg');

            // تعديل الرابط ليكون ثابت ومطابق لـ Authorized Domains
            const actionCodeSettings = {
                url: 'https://ahmedgall.github.io/testgemel/oo.html',
                handleCodeInApp: true,
            };

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';

            try {
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                
                msgContainer.classList.remove('hidden');
                msg.innerText = "تم إرسال رابط الدخول السري بنجاح. تفقد بريدك الوارد الآن.";
                btn.innerHTML = '✅ تم الإرسال';
            } catch (error) {
                console.error("Error Detail:", error.code);
                alert("خطأ: " + error.message);
                btn.disabled = false;
                btn.innerHTML = 'إرسال رابط الدخول';
            }
        });
    </script>
</body>
</html>
