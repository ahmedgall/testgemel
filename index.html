<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | بوابة الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --bg-dark: #050505; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; width: 100%; max-width: 450px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; width: 100%; padding: 1.2rem; border-radius: 1.25rem; text-align: center; color: white; font-size: 1.1rem; }
        .input-dark:focus { border-color: var(--primary); outline: none; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 15px rgba(225, 29, 72, 0.1); }
        .btn-premium { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); width: 100%; padding: 1.2rem; border-radius: 1.25rem; font-weight: bold; transition: 0.3s; cursor: pointer; color: white; border: none; font-size: 1.1rem; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(225, 29, 72, 0.4); }
        .hidden { display: none; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-white mb-3 tracking-tighter">THE BRIDE</h1>
            <p id="statusText" class="text-gray-400 text-sm">أدخل رقم الموبايل للدخول أو التسجيل</p>
        </div>

        <div id="phoneStep">
            <div class="space-y-4">
                <input type="tel" id="userPhone" class="input-dark" placeholder="2010xxxxxxxx" dir="ltr">
                <button onclick="sendOTP()" id="sendBtn" class="btn-premium flex items-center justify-center">
                    <span>إرسال رمز التحقق</span>
                    <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full spin mr-3"></div>
                </button>
            </div>
            <p class="text-[10px] text-gray-500 text-center mt-6 uppercase tracking-widest">Login via WhatsApp OTP</p>
        </div>

        <div id="otpStep" class="hidden animate-fadeIn">
            <div class="text-center mb-6">
                <p class="text-rose-500 font-bold mb-2">تم إرسال رمز التحقق إلى واتساب</p>
                <button onclick="location.reload()" class="text-gray-500 text-xs underline">تغيير الرقم؟</button>
            </div>
            <input type="text" id="otpInput" class="input-dark text-3xl tracking-[12px] font-bold mb-4" placeholder="000000" maxlength="6">
            <button onclick="verifyOTP()" id="verifyBtn" class="btn-premium bg-green-600">تأكيد الدخول</button>
        </div>

        <div class="mt-12 text-center border-t border-white/5 pt-6 text-[9px] text-gray-700 tracking-[5px]">
            FIXAA ARAB SOFTWARE SOLUTIONS
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";

        let generatedOTP = "";
        let phoneNumber = "";

        // وظيفة إرسال الـ OTP
        window.sendOTP = async () => {
            phoneNumber = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('sendBtn');
            const loader = document.getElementById('btnLoader');

            if (!phoneNumber || phoneNumber.length < 10) {
                return alert("يرجى إدخال رقم هاتف صحيح (مثال: 2010...)");
            }

            // تأمين إضافة كود الدولة لو مش موجود
            if (!phoneNumber.startsWith('20')) {
                phoneNumber = '20' + phoneNumber.replace(/^0+/, '');
            }

            btn.disabled = true;
            loader.classList.remove('hidden');

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            const params = new URLSearchParams({ 
                "token": TOKEN, 
                "to": phoneNumber, 
                "body": `*The Bride*\n\nكود التحقق الخاص بك هو: *${generatedOTP}*\n\nلا تشارك هذا الكود مع أحد.` 
            });

            try {
                const response = await fetch(API_URL, { method: 'POST', body: params });
                const result = await response.json();

                if (result.sent === "true" || result.success) {
                    document.getElementById('phoneStep').classList.add('hidden');
                    document.getElementById('otpStep').classList.remove('hidden');
                } else {
                    alert("فشل الإرسال، تأكد من صلاحية خدمة الواتساب.");
                    btn.disabled = false;
                    loader.classList.add('hidden');
                }
            } catch (e) {
                alert("خطأ في الاتصال بالسيرفر");
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        // وظيفة التحقق والدخول
        window.verifyOTP = async () => {
            const inputOTP = document.getElementById('otpInput').value.trim();
            const verifyBtn = document.getElementById('verifyBtn');

            if (inputOTP !== generatedOTP) {
                return alert("الرمز غير صحيح، حاول مرة أخرى.");
            }

            verifyBtn.disabled = true;
            verifyBtn.innerText = "جاري التحقق...";

            try {
                // نتحقق إذا كان الشريك موجوداً أصلاً في قاعدة البيانات
                const userRef = doc(db, "partners", phoneNumber);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // إذا كان جديد، نقوم بإنشاء سجل له (بدون باسورد)
                    await setDoc(userRef, {
                        phone: phoneNumber,
                        joinedAt: serverTimestamp(),
                        status: "new_partner"
                    });
                }

                // حفظ الجلسة
                sessionStorage.setItem('isAuth', 'true');
                sessionStorage.setItem('userPhone', phoneNumber);

                // التوجه لصفحة إكمال البيانات أو لوحة التحكم
                window.location.href = "oo.html";

            } catch (err) {
                console.error(err);
                alert("خطأ أثناء تسجيل البيانات.");
                verifyBtn.disabled = false;
                verifyBtn.innerText = "تأكيد الدخول";
            }
        };
    </script>
</body>
</html>
