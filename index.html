<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | بوابة الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --bg-dark: #050505; }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: #ffffff; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(225, 29, 72, 0.05), transparent);
        }
        .auth-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; }
        .input-dark:focus { border-color: var(--primary); outline: none; }
        .btn-premium { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="auth-card w-full max-w-md p-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">The Bride</h1>
            <p id="statusText" class="text-gray-400 text-sm italic uppercase">تسجيل دخول الشركاء</p>
        </div>

        <div id="step1" class="space-y-4">
            <input type="tel" id="userPhone" class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="رقم الموبايل (2010...)">
            <input type="password" id="userPass" class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="كلمة السر">
            
            <button onclick="sendOTP()" id="mainBtn" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg">إرسال كود التحقق</button>
            
            <p class="text-[10px] text-center text-gray-600 mt-4">سيتم إرسال الكود عبر الواتساب الخاص بك</p>
        </div>

        <div id="step2" class="hidden space-y-4">
            <p class="text-center text-rose-500 text-sm">أدخل الكود المكون من 6 أرقام</p>
            <input type="text" id="otpInput" class="w-full input-dark p-4 rounded-2xl text-white text-center text-2xl tracking-[10px]" placeholder="000000">
            <button onclick="verifyAndLogin()" class="w-full bg-green-600 py-4 rounded-2xl font-bold text-lg">تأكيد ودخول</button>
            <button onclick="location.reload()" class="w-full text-gray-500 text-xs">رجوع؟</button>
        </div>

        <div class="mt-8 text-center border-t border-white/5 pt-6 text-[10px] text-gray-600 tracking-[4px]">
            POWERED BY FIXAA ARAB
        </div>
    </div>

    <script>
        const INSTANCE_ID = 'instance171381';
        const TOKEN = '5fh5hfytsg5mml9n';
        let generatedOTP;

        async function sendOTP() {
            const phone = document.getElementById('userPhone').value;
            const pass = document.getElementById('userPass').value;

            if (!phone || !pass) return alert("اكتب الرقم والباسورد يا بطل!");

            generatedOTP = Math.floor(100000 + Math.random() * 900000);
            
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';

            // إرسال للواتساب
            const url = `https://api.ultramsg.com/${INSTANCE_ID}/messages/chat`;
            const params = new URLSearchParams({
                "token": TOKEN,
                "to": phone,
                "body": `*The Bride Security*\n\nكود دخول لوحة التحكم الخاص بك هو: *${generatedOTP}*\n\nكلمة السر المدخلة: ******`
            });

            try {
                const response = await fetch(url, { method: 'POST', body: params });
                const res = await response.json();
                if (res.sent === "true") {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('statusText').innerText = "تم إرسال الكود";
                }
            } catch (e) { alert("حدث خطأ في الإرسال"); }
        }

        function verifyAndLogin() {
            const input = document.getElementById('otpInput').value;
            if (input == generatedOTP) {
                // حفظ الجلسة في المتصفح
                sessionStorage.setItem('isPartner', 'true');
                window.location.href = "oo.html";
            } else {
                alert("الكود غلط، راجع الواتساب!");
            }
        }
    </script>
</body>
</html>
