<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | بوابة الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --bg-dark: #050505; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(225, 29, 72, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(225, 29, 72, 0.05), transparent);
            color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden;
        }
        .auth-card {
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .input-dark {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-dark:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.07); outline: none; box-shadow: 0 0 15px rgba(225, 29, 72, 0.1); }
        .btn-premium { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); transition: all 0.3s ease; }
        .btn-premium:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3); }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div class="auth-card w-full max-w-md p-10 relative">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">The Bride</h1>
            <p id="formTitle" class="text-gray-400 text-sm italic uppercase tracking-widest">تسجيل الدخول للشركاء</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="email" id="loginEmail" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPass" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="كلمة السر">
            
            <button type="submit" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg shadow-xl">دخول</button>
            
            <div class="flex justify-between text-xs text-gray-500 px-2">
                <button type="button" onclick="toggleForm('forgot')" class="hover:text-rose-500">نسيت كلمة السر؟</button>
                <button type="button" onclick="toggleForm('register')" class="hover:text-rose-500">إنشاء حساب جديد</button>
            </div>
        </form>

        <form id="registerForm" class="hidden space-y-4">
            <input type="email" id="regEmail" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="كلمة السر">
            <input type="password" id="regPassConfirm" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="تأكيد كلمة السر">
            
            <button type="submit" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg shadow-xl text-white">تسجيل الحساب</button>
            <button type="button" onclick="toggleForm('login')" class="w-full text-xs text-gray-500 mt-2">لديك حساب بالفعل؟ دخول</button>
        </form>

        <form id="forgotForm" class="hidden space-y-4">
            <p class="text-xs text-gray-400 text-center mb-4">أدخل إيميلك وسنرسل لك رابط استعادة كلمة السر</p>
            <input type="email" id="forgotEmail" required class="w-full input-dark p-4 rounded-2xl text-white text-center" placeholder="بريدك الإلكتروني">
            <button type="submit" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg shadow-xl">إرسال رابط الاستعادة</button>
            <button type="button" onclick="toggleForm('login')" class="w-full text-xs text-gray-500 mt-2">رجوع للدخول</button>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6 text-[10px] text-gray-600 tracking-[4px]">
            POWERED BY FIXAA ARAB
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // تبديل بين الفورمز
        window.toggleForm = (type) => {
            const forms = ['loginForm', 'registerForm', 'forgotForm'];
            forms.forEach(f => document.getElementById(f).classList.add('hidden'));
            
            if(type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('formTitle').innerText = 'تسجيل الدخول للشركاء';
            } else if(type === 'register') {
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('formTitle').innerText = 'انضم لعائلة الشركاء';
            } else {
                document.getElementById('forgotForm').classList.remove('hidden');
                document.getElementById('formTitle').innerText = 'استعادة الحساب';
            }
        }

        // 1. تسجيل الدخول
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
                window.location.href = "oo.html";
            } catch (error) { alert("خطأ في البيانات أو الحساب غير موجود"); }
        }

        // 2. إنشاء حساب جديد
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            if(regPass.value !== regPassConfirm.value) return alert("كلمات السر غير متطابقة!");
            try {
                await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
                alert("تم إنشاء الحساب بنجاح!");
                window.location.href = "oo.html";
            } catch (error) { alert("فشل التسجيل: " + error.message); }
        }

        // 3. استعادة الباسورد
        document.getElementById('forgotForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await sendPasswordResetEmail(auth, forgotEmail.value);
                alert("تم إرسال رابط الاستعادة لإيميلك.. تفقد البريد الوارد");
                toggleForm('login');
            } catch (error) { alert("تأكد من صحة الإيميل"); }
        }
    </script>
</body>
</html>
