<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | Partners Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e11d48;
            --bg-dark: #050505;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(225, 29, 72, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(225, 29, 72, 0.05), transparent);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .auth-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-dark:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.15);
            outline: none;
        }
        .btn-premium {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
            transition: all 0.3s ease;
        }
        .btn-premium:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3);
            filter: brightness(1.1);
        }
        .btn-premium:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div class="auth-card w-full max-w-md p-10 relative">
        <div class="text-center mb-8">
            <div class="inline-block p-4 rounded-full bg-rose-600/10 mb-4">
                <svg class="w-12 h-12 text-rose-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">The Bride</h1>
            <p class="text-gray-400 text-sm font-light uppercase tracking-widest italic">Partners Gateway</p>
        </div>

        <div id="phoneStep" class="space-y-6">
            <div class="relative">
                <input type="tel" id="userPhone" required 
                    class="w-full input-dark p-4 rounded-2xl text-white placeholder-gray-600 text-center text-lg font-semibold" 
                    placeholder="201207982437">
                <p class="text-[10px] text-gray-500 mt-2 text-center tracking-wider uppercase">يرجى كتابة الرقم بكود الدولة</p>
            </div>

            <button type="button" onclick="sendWhatsAppOTP()" id="sendBtn" class="w-full btn-premium py-4 rounded-2xl font-bold text-lg shadow-xl">
                <span id="btnText">دخول عبر واتساب</span>
            </button>
        </div>

        <div id="otpStep" class="hidden space-y-6 animate-fadeIn">
            <div class="text-center mb-4">
                <p class="text-sm text-rose-500 font-medium">أرسلنا كود التحقق لرقمك</p>
            </div>
            <input type="text" id="otpInput" maxlength="6"
                class="w-full input-dark p-4 rounded-2xl text-white text-center text-3xl tracking-[10px] font-black" 
                placeholder="000000">
            
            <button type="button" onclick="verifyOTP()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-2xl font-bold text-lg shadow-lg transition-all">
                تأكيد الكود
            </button>
            <button onclick="location.reload()" class="w-full text-gray-500 text-xs hover:text-white transition-colors">تغيير الرقم؟</button>
        </div>

        <div class="mt-12 text-center border-t border-white/5 pt-6">
            <p class="text-gray-600 text-[10px] tracking-[4px]">POWERED BY FIXAA ARAB</p>
        </div>
    </div>

    <script>
        // إعدادات UltraMsg الخاصة بك
        const INSTANCE_ID = 'instance171381';
        const TOKEN = '5fh5hfytsg5mml9n';
        let generatedOTP;

        async function sendWhatsAppOTP() {
            const phone = document.getElementById('userPhone').value;
            const btn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');

            if (!phone || phone.length < 10) {
                alert("من فضلك اكتب رقم موبايل صحيح بكود الدولة.");
                return;
            }

            // 1. توليد كود عشوائي 6 أرقام
            generatedOTP = Math.floor(100000 + Math.random() * 900000);
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> جاري الإرسال...';

            // 2. إرسال الرسالة عبر UltraMsg API
            const url = `https://api.ultramsg.com/${INSTANCE_ID}/messages/chat`;
            const params = new URLSearchParams({
                "token": TOKEN,
                "to": phone,
                "body": `*The Bride | بوابة الشركاء*\n\nكود التحقق الخاص بك هو: *${generatedOTP}*\n\nيرجى إدخال الكود في التطبيق لإكمال عملية الدخول.\n\n_Fixaa Arab Security System_`
            });

            try {
                const response = await fetch(url, { method: 'POST', body: params });
                const result = await response.json();

                if (result.sent === "true") {
                    // إخفاء خانة الرقم وإظهار خانة الكود
                    document.getElementById('phoneStep').classList.add('hidden');
                    document.getElementById('otpStep').classList.remove('hidden');
                } else {
                    alert("فشل الإرسال. تأكد من ربط الرقم في UltraMsg.");
                    resetBtn();
                }
            } catch (error) {
                console.error("Error:", error);
                alert("حدث خطأ في الاتصال بالخادم.");
                resetBtn();
            }
        }

        function verifyOTP() {
            const userInput = document.getElementById('otpInput').value;
            if (userInput == generatedOTP) {
                // تخزين حالة الدخول
                sessionStorage.setItem('isAuth', 'true');
                // التحويل لصفحة الأقسام
                window.location.href = "oo.html";
            } else {
                alert("الكود غير صحيح! حاول مرة أخرى.");
            }
        }

        function resetBtn() {
            const btn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = false;
            btnText.innerHTML = 'دخول عبر واتساب';
        }
    </script>
</body>
</html>
