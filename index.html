<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bride | بوابة الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e11d48; --bg-dark: #050505; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; width: 100%; max-width: 450px; padding: 2.5rem; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; width: 100%; padding: 1rem; border-radius: 1rem; text-align: center; color: white; margin-bottom: 1rem; }
        .input-dark:focus { border-color: var(--primary); outline: none; background: rgba(255, 255, 255, 0.07); }
        .btn-premium { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); width: 100%; padding: 1rem; border-radius: 1rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">The Bride</h1>
            <p id="formTitle" class="text-gray-400 text-sm italic">تسجيل دخول الشركاء</p>
        </div>

        <div id="loginForm">
            <input type="tel" id="loginPhone" class="input-dark" placeholder="رقم الموبايل (2010...)">
            <input type="password" id="loginPass" class="input-dark" placeholder="كلمة السر">
            <button onclick="handleAuth('login')" class="btn-premium">دخول</button>
            <div class="flex justify-between mt-4 text-xs text-gray-500">
                <button onclick="showForm('forgot')" class="hover:text-rose-500">نسيت الباسورد؟</button>
                <button onclick="showForm('register')" class="hover:text-rose-500">إنشاء حساب جديد</button>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <input type="tel" id="regPhone" class="input-dark" placeholder="رقم الموبايل">
            <input type="password" id="regPass" class="input-dark" placeholder="كلمة السر">
            <input type="password" id="regPassConfirm" class="input-dark" placeholder="تأكيد كلمة السر">
            <button onclick="handleAuth('register')" class="btn-premium">إنشاء حساب وإرسال كود</button>
            <button onclick="showForm('login')" class="w-full mt-4 text-xs text-gray-500">لديك حساب؟ سجل دخولك</button>
        </div>

        <div id="forgotForm" class="hidden">
            <p class="text-xs text-gray-400 text-center mb-4">أدخل رقمك وسنرسل لك كود لإعادة التعيين</p>
            <input type="tel" id="forgotPhone" class="input-dark" placeholder="رقم الموبايل">
            <button onclick="handleAuth('forgot')" class="btn-premium">إرسال كود الاستعادة</button>
            <button onclick="showForm('login')" class="w-full mt-4 text-xs text-gray-500">رجوع</button>
        </div>

        <div id="otpStep" class="hidden text-center">
            <p class="text-rose-500 text-sm mb-4">أدخل الكود المرسل على واتساب</p>
            <input type="text" id="otpInput" class="input-dark text-2xl tracking-[10px]" placeholder="000000" maxlength="6">
            <button id="verifyBtn" class="btn-premium bg-green-600">تأكيد الرمز</button>
        </div>

        <div class="mt-8 text-center border-t border-white/5 pt-6 text-[10px] text-gray-600 tracking-[4px]">
            POWERED BY FIXAA ARAB
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXLzoTGPV7uvmstWrXU8F3U7dZy1VCY2k",
            authDomain: "gggg-4cab7.firebaseapp.com",
            projectId: "gggg-4cab7",
            storageBucket: "gggg-4cab7.firebasestorage.app",
            messagingSenderId: "51351904886",
            appId: "1:51351904886:web:e71724e6bbd2837f333557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";
        
        // خزن الأكواد في الـ window عشان تضمن وصول الـ Functions ليها
        window.currentOTP = "";
        window.currentAction = "";
        window.currentUserPhone = "";

        window.showForm = (type) => {
            document.querySelectorAll('.auth-card > div:not(.text-center):not(.mt-8)').forEach(d => d.classList.add('hidden'));
            document.getElementById(type + 'Form').classList.remove('hidden');
            document.getElementById('formTitle').innerText = type === 'login' ? 'دخول الشركاء' : (type === 'register' ? 'انضم إلينا' : 'استعادة الحساب');
        };

        window.handleAuth = async (action) => {
            window.currentAction = action;
            const phoneField = document.getElementById(action + 'Phone');
            const phone = phoneField.value.trim();

            if (!phone) return alert("دخل الرقم يا بطل!");

            // توليد OTP كـ String لضمان دقة المقارنة
            window.currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
            window.currentUserPhone = phone;
            
            console.log("OTP for testing: " + window.currentOTP);

            const params = new URLSearchParams({ 
                "token": TOKEN, 
                "to": phone, 
                "body": `*The Bride*\n\nكود التحقق الخاص بك هو: *${window.currentOTP}*` 
            });
            
            try {
                const response = await fetch(API_URL, { method: 'POST', body: params });
                const result = await response.json();
                
                if (result.sent === "true" || result.success) {
                    document.getElementById(action + 'Form').classList.add('hidden');
                    document.getElementById('otpStep').classList.remove('hidden');
                } else {
                    alert("فشل إرسال الكود. تأكد من الرقم (مثال: 2010...)");
                }
            } catch (e) { 
                alert("مشكلة في سيرفر الواتساب"); 
            }
        };

        document.getElementById('verifyBtn').onclick = async () => {
            const inputCode = document.getElementById('otpInput').value.trim();

            if (inputCode !== window.currentOTP) {
                return alert("الكود غلط! راجع الواتساب.");
            }

            // لو الكود صح، نبدأ تنفيذ العمليات
            try {
                if (window.currentAction === 'register') {
                    const pass = document.getElementById('regPass').value;
                    const confirm = document.getElementById('regPassConfirm').value;
                    if (pass !== confirm) return alert("الباسورد مش متطابق!");
                    
                    await setDoc(doc(db, "partners", window.currentUserPhone), { password: pass });
                } 
                
                if (window.currentAction === 'login') {
                    const pass = document.getElementById('loginPass').value;
                    const userDoc = await getDoc(doc(db, "partners", window.currentUserPhone));
                    
                    if (!userDoc.exists() || userDoc.data().password !== pass) {
                        return alert("رقم الموبايل أو الباسورد غلط!");
                    }
                }

                // حفظ الداتا في السشن عشان الصفحة اللي جاية
                sessionStorage.setItem('isAuth', 'true');
                sessionStorage.setItem('userPhone', window.currentUserPhone);
                
                window.location.href = "oo.html";
            } catch (err) {
                alert("حدث خطأ في قاعدة البيانات");
                console.error(err);
            }
        };
    </script>
</body>
</html>
